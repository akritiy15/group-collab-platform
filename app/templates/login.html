<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunCollab - Login</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Modern SaaS Dashboard Styling Overrides */
        :root {
            --bg-color: #fbfcff;
            --text-main: #111827;
            --text-muted: #4b5563; /* slightly darker for better readability inside form */
            --border-light: #e5e7eb;
            --accent-dark: #000000;
            --accent-hover: #1f2937;
            --card-surface: #ffffff;
            --input-bg: #f9fafb;
            --input-border: #d1d5db;
            --input-focus-border: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top center, #f3f4f6 0%, transparent 100%);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Navbar Refined */
        .navbar {
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: rgba(251, 252, 255, 0.75);
            border-bottom: 1px solid rgba(229, 231, 235, 0.5);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            color: var(--accent-dark);
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        /* Nav links styles matching previous pages */
        .btn-primary-sm {
            background-color: var(--accent-dark);
            color: #ffffff;
            padding: 0.4rem 1rem;
            font-size: 0.875rem;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        }

        .btn-primary-sm:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* Centered Auth Layout */
        .auth-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 4rem 1rem;
            position: relative;
        }

        /* Subtle Background Accent for the Sign In Page */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(230,230,235,0.4) 0%, rgba(255,255,255,0) 70%);
            filter: blur(60px);
            z-index: -1;
            pointer-events: none;
        }

        /* Modern Card Form */
        .auth-card {
            background: var(--card-surface);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            text-align: left;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .auth-header p {
            color: #6b7280;
            font-size: 0.95rem;
            margin: 0;
        }

        /* Input Group Overrides */
        .input-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .input-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }

        .input-group input::placeholder {
            color: #9ca3af;
        }

        .input-group input:focus {
            border-color: var(--input-focus-border);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(209, 213, 219, 0.3);
        }

        /* Button Styling Refined */
        .btn-block {
            width: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.75rem;
            background-color: var(--accent-dark);
            color: #ffffff;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            margin-top: 0.5rem;
        }

        .btn-block:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 10px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        }

        /* Alternative Action Link */
        .auth-footer {
            margin-top: 1.75rem;
            text-align: center;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .auth-footer a {
            color: var(--text-main);
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
            border-bottom: 1px solid transparent;
        }

        .auth-footer a:hover {
            border-bottom-color: var(--text-main);
        }

    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">
                <i class="ph-fill ph-circles-three-plus"></i>
                FunCollab
            </a>
            <div class="nav-links">
                <a href="/register" class="btn-primary-sm">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="ambient-glow"></div>
        
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Log in to pick up where you left off.</p>
            </div>

            <form method="POST">
                <!-- Flask Input names untouched. -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-block">
                    Log In
                    <i class="ph ph-sign-in"></i>
                </button>
            </form>

            <div class="auth-footer">
                New to the party? <a href="{{ url_for('auth.register') }}">Create an account</a>
            </div>
        </div>
    </div>

    <!-- Original Flask Template JS Unchanged -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
