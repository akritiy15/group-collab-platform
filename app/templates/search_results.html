{% extends "base.html" %}

{% block content %}

<style>
  /* Base Container Styles */
  .search-container {
    max-width: 600px;
    margin: 40px auto;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #111827;
    padding: 0 20px;
  }

  .search-header {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    color: #1F2937;
    letter-spacing: -0.025em;
  }

  /* User List & Cards */
  .user-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .user-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #ffffff;
    border: 1px solid #D8E2D1;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    transition: all 0.2s ease;
  }

  .user-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px -2px rgba(0, 0, 0, 0.05);
    border-color: #9CAF88;
  }

  .user-name {
    font-weight: 500;
    font-size: 0.95rem;
    color: #1F2937;
  }

  /* Buttons */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background-color: #9CAF88;
    /* Sage Green */
    color: #ffffff;
    font-weight: 500;
    font-size: 0.875rem;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    text-decoration: none;
    transition: background-color 0.2s ease, transform 0.1s ease;
    border: 1px solid transparent;
    cursor: pointer;
  }

  .btn-primary:hover {
    background-color: #8A9D76;
    color: #ffffff;
    text-decoration: none;
  }

  .btn-primary:active {
    transform: scale(0.97);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background-color: #ffffff;
    color: #6B7280;
    font-weight: 500;
    font-size: 0.875rem;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    text-decoration: none;
    border: 1px solid #D8E2D1;
    transition: all 0.2s ease;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
  }

  .btn-secondary:hover {
    background-color: #F6F8F5;
    color: #1F2937;
    border-color: #9CAF88;
    text-decoration: none;
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 3rem 1.5rem;
    background-color: #F6F8F5;
    border: 1px dashed #D8E2D1;
    border-radius: 10px;
    color: #6B7280;
    font-size: 0.95rem;
  }

  .bottom-actions {
    margin-top: 2rem;
    display: flex;
    justify-content: flex-start;
  }
</style>

<div class="search-container">
  <h2 class="search-header">Search Results</h2>

  {% if users %}
  <ul class="user-list">
    {% for user in users %}
    <li class="user-card">
      <span class="user-name">{{ user.username }}</span>

      <a href="{{ url_for('groups.send_request', user_id=user.id) }}" class="btn-dashboard btn-primary">
        Send Request
      </a>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <div class="empty-state">
    <p>No users found.</p>
  </div>
  {% endif %}

  <div class="bottom-actions">
    <a href="{{ url_for('groups.dashboard') }}" class="btn-secondary">
      &larr; Back to Dashboard
    </a>
  </div>
</div>

{% endblock %}
