<!DOCTYPE html>
<html>
<head>
    <title>Group Collaboration App</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        .navbar {
            background: #222;
            padding: 12px;
        }

        .navbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="navbar">

    <a href="{{ url_for('groups.dashboard') }}">Dashboard</a>

    <a href="{{ url_for('profile.view_profile') }}">Profile</a>

    <a href="{{ url_for('groups.create_group') }}">Create Group</a>

    <a href="{{ url_for('groups.join_group') }}">Join Group</a>
    <a href="{{ url_for('groups.dashboard') }}">Requests</a>

    <a href="{{ url_for('auth.logout') }}">Logout</a>

</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
